---
layout: default
title: 卡牌图鉴
---

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "ABC Diatype", -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
    background: #1C1C1C;
    color: #E8E8E8;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding: 0;
  }

  /* Navigation */
  nav {
    background: rgba(28, 28, 28, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #2A2A2A;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .nav-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .back-link a {
    color: #A0A0A0;
    text-decoration: none;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s ease;
  }

  .back-link a:hover {
    color: #E8E8E8;
  }

  .page-title {
    font-size: 1.1rem;
    font-weight: 500;
    color: #E8E8E8;
    letter-spacing: -0.01em;
  }

  /* Header Section */
  .header-section {
    padding: 60px 40px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  h1 {
    font-size: 3rem;
    font-weight: 500;
    color: #FFFFFF;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .header-description {
    font-size: 1.2rem;
    color: #A0A0A0;
    margin-bottom: 40px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 40px;
  }

  .filter-tabs {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filter-tab {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #3A3A3A;
    border-radius: 6px;
    color: #A0A0A0;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .filter-tab:hover {
    border-color: #4A4A4A;
    background: #252525;
    color: #E8E8E8;
  }

  .filter-tab.active {
    background: #E8E8E8;
    color: #1C1C1C;
    border-color: #E8E8E8;
  }

  .search-box {
    flex: 1;
    min-width: 300px;
    max-width: 400px;
  }

  .search-box input {
    width: 100%;
    padding: 12px 20px;
    font-size: 0.95rem;
    border: 1px solid #3A3A3A;
    border-radius: 6px;
    background: #252525;
    color: #E8E8E8;
    transition: all 0.2s ease;
  }

  .search-box input::placeholder {
    color: #666666;
  }

  .search-box input:focus {
    outline: none;
    border-color: #4A4A4A;
    background: #2A2A2A;
  }

  /* Cards Grid */
  .cards-container {
    padding: 0 40px 80px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 32px;
    margin-bottom: 40px;
  }

  .card-wrapper {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-item {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #252525;
    border: 1px solid #2A2A2A;
  }

  .card-item:hover {
    transform: translateY(-4px);
    border-color: #3A3A3A;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }

  .card-item img {
    width: 120%;
    height: 120%;
    object-fit: cover;
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .card-name-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
    color: #E8E8E8;
    padding: 20px 12px 12px;
    font-size: 0.85rem;
    font-weight: 500;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .card-item:hover .card-name-overlay {
    opacity: 1;
  }

  .card-versions {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .version-toggle {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid #3A3A3A;
    border-radius: 6px;
    color: #A0A0A0;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.85rem;
    font-weight: 500;
  }

  .version-toggle:hover {
    border-color: #4A4A4A;
    background: #252525;
    color: #E8E8E8;
  }

  .version-toggle.active {
    background: #E8E8E8;
    color: #1C1C1C;
    border-color: #E8E8E8;
  }

  .no-results {
    text-align: center;
    padding: 100px 20px;
    color: #666666;
    font-size: 1.1rem;
    grid-column: 1 / -1;
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    max-width: 90%;
    max-height: 90vh;
    position: relative;
  }

  .modal-content img {
    max-width: 100%;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
  }

  .close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #E8E8E8;
    font-size: 36px;
    font-weight: 300;
    cursor: pointer;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(28, 28, 28, 0.8);
    border-radius: 50%;
    border: 1px solid #3A3A3A;
    transition: all 0.2s ease;
  }

  .close-modal:hover {
    background: rgba(28, 28, 28, 0.95);
    border-color: #4A4A4A;
  }

  /* Stats */
  .stats {
    text-align: center;
    padding: 20px;
    color: #666666;
    font-size: 0.9rem;
  }

  /* Responsive */
  @media (max-width: 768px) {
    h1 {
      font-size: 2rem;
    }

    .nav-container {
      padding: 16px 20px;
    }

    .header-section {
      padding: 40px 20px 30px;
    }

    .cards-container {
      padding: 0 20px 60px;
    }

    .controls {
      flex-direction: column;
      align-items: stretch;
    }

    .search-box {
      max-width: 100%;
    }

    .cards-grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
  }
</style>

<nav>
  <div class="nav-container">
    <div class="back-link">
      <a href="{{ site.baseurl }}/">← 返回首页</a>
    </div>
    <div class="page-title">卡牌图鉴</div>
  </div>
</nav>

<div class="header-section">
  <h1>卡牌图鉴</h1>
  <p class="header-description">浏览所有轴伊角色的卡牌，包括基础版本和升级版本</p>

  <div class="controls">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">全部卡牌</button>
      <button class="filter-tab" data-filter="attack">攻击</button>
      <button class="filter-tab" data-filter="skill">技能</button>
      <button class="filter-tab" data-filter="power">能力</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索卡牌...">
    </div>
  </div>
</div>

<div class="cards-container">
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="no-results" id="noResults" style="display: none;">未找到匹配的卡牌</div>
  <div class="stats" id="stats"></div>
</div>

<div class="modal" id="modal">
  <span class="close-modal" id="closeModal">×</span>
  <div class="modal-content">
    <img id="modalImage" src="" alt="Card">
  </div>
</div>

<script>
  const baseUrl = "{{ site.baseurl }}";
  let cardsData = [];

  fetch(baseUrl + '/static/cards/meta.json')
    .then(r => r.json())
    .then(data => { cardsData = data; init(); });

  const cardsGrid = document.getElementById('cardsGrid');
  const noResults = document.getElementById('noResults');
  const searchInput = document.getElementById('searchInput');
  const filterTabs = document.querySelectorAll('.filter-tab');
  const modal = document.getElementById('modal');
  const modalImage = document.getElementById('modalImage');
  const stats = document.getElementById('stats');

  let currentFilter = 'all';
  let currentSearch = '';
  const cardStates = {};

  function init() {
    renderCards();
    searchInput.addEventListener('input', () => { currentSearch = searchInput.value; renderCards(); });
    filterTabs.forEach(tab => tab.addEventListener('click', () => {
      filterTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderCards();
    }));
    document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('active'); });
  }

  function renderCards() {
    cardsGrid.innerHTML = '';
    let visibleCount = 0;

    cardsData.forEach(card => {
      if (!cardStates[card.id]) cardStates[card.id] = 'base';
      const ver = cardStates[card.id];
      const file = ver === 'upgraded' && card.upgraded ? card.upgraded : card.base;
      if (!file) return;

      const matchesSearch = card.name.includes(currentSearch) ||
                            card.id.toLowerCase().includes(currentSearch.toLowerCase());
      const matchesFilter = currentFilter === 'all' || card.type === currentFilter;
      if (!matchesSearch || !matchesFilter) return;

      visibleCount++;
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      const cardDiv = document.createElement('div');
      cardDiv.className = 'card-item';
      cardDiv.onclick = () => { modalImage.src = baseUrl + '/static/cards/' + file; modal.classList.add('active'); };

      const img = document.createElement('img');
      img.src = baseUrl + '/static/cards/' + file;
      img.alt = card.name;
      img.loading = 'lazy';
      cardDiv.appendChild(img);

      const nameOverlay = document.createElement('div');
      nameOverlay.className = 'card-name-overlay';
      nameOverlay.textContent = card.name;
      cardDiv.appendChild(nameOverlay);

      wrapper.appendChild(cardDiv);

      if (card.upgraded) {
        const toggleDiv = document.createElement('div');
        toggleDiv.className = 'card-versions';

        const baseBtn = document.createElement('button');
        baseBtn.className = 'version-toggle' + (ver === 'base' ? ' active' : '');
        baseBtn.textContent = '基础';
        baseBtn.onclick = () => { cardStates[card.id] = 'base'; renderCards(); };

        const upgradedBtn = document.createElement('button');
        upgradedBtn.className = 'version-toggle' + (ver === 'upgraded' ? ' active' : '');
        upgradedBtn.textContent = '升级';
        upgradedBtn.onclick = () => { cardStates[card.id] = 'upgraded'; renderCards(); };

        toggleDiv.appendChild(baseBtn);
        toggleDiv.appendChild(upgradedBtn);
        wrapper.appendChild(toggleDiv);
      }

      cardsGrid.appendChild(wrapper);
    });

    noResults.style.display = visibleCount === 0 ? 'block' : 'none';
    stats.textContent = `显示 ${visibleCount} / ${cardsData.length} 张卡牌`;
  }
</script>
